<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasaporte Digital de Autenticidad · Artesanía Andina del Perú</title>
<style>
  :root{
    --night:#14121f; --night2:#1e1b2e; --night3:#272238;
    --cream:#f4efe4; --cream2:#e9e1d1; --vicuna:#c9a26b; --gold:#e0b352;
    --terra:#c85a3c; --cochi:#9e2b4e; --jade:#2f8f80;
    --line:rgba(244,239,228,.12); --txt:#f4efe4; --muted:#b3aab9;
    --brand:linear-gradient(135deg,var(--terra),var(--cochi));
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:var(--txt);line-height:1.5;background:var(--night);
    background-image:
      radial-gradient(900px 500px at 12% -10%, rgba(158,43,78,.22), transparent 60%),
      radial-gradient(800px 500px at 100% 0%, rgba(47,143,128,.18), transparent 55%),
      radial-gradient(700px 600px at 50% 120%, rgba(224,179,82,.10), transparent 60%);
    min-height:100vh;-webkit-font-smoothing:antialiased;padding:24px 16px 40px}
  .band{height:8px;border-radius:99px;max-width:560px;margin:0 auto 22px;background:repeating-linear-gradient(135deg,var(--terra) 0 10px,var(--cochi) 10px 20px,var(--gold) 20px 30px,var(--jade) 30px 40px);opacity:.9}
  .wrap{max-width:560px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:13px;justify-content:center;margin-bottom:20px}
  .chakana{width:40px;height:40px;flex:none}
  .brand .bt{font-weight:800;font-size:1.02rem;letter-spacing:.02em}
  .brand .bs{font-size:.74rem;color:var(--muted)}
  .card{background:linear-gradient(160deg,var(--night2),var(--night3));border:1px solid var(--line);border-radius:20px;padding:26px 24px;box-shadow:0 30px 80px -30px rgba(0,0,0,.7);position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent 0 22px,rgba(224,179,82,.025) 22px 23px);pointer-events:none}
  .verified{display:inline-flex;align-items:center;gap:7px;background:rgba(47,143,128,.16);border:1px solid rgba(47,143,128,.45);color:#7fe0cf;font-weight:800;font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;padding:6px 13px;border-radius:999px}
  .label{font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:800;margin:18px 0 4px}
  h1{font-size:1.7rem;font-weight:800;line-height:1.15;margin-bottom:4px}
  .region{color:var(--vicuna);font-weight:700;font-size:1rem;display:flex;align-items:center;gap:6px}
  .rows{margin-top:20px;border-top:1px solid var(--line);padding-top:6px}
  .rows .r{display:flex;gap:14px;padding:11px 0;border-bottom:1px solid var(--line)}
  .rows .k{flex:none;width:108px;font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;font-weight:700;padding-top:2px}
  .rows .v{flex:1;font-weight:600;color:var(--cream)}
  .story{margin-top:20px;font-style:italic;color:var(--cream2);font-size:1.02rem;line-height:1.6;border-left:3px solid var(--gold);padding:4px 0 4px 16px}
  .code-tag{margin-top:22px;display:flex;align-items:center;justify-content:space-between;gap:12px;background:rgba(224,179,82,.08);border:1px solid rgba(224,179,82,.25);border-radius:12px;padding:13px 16px}
  .code-tag .c{font-weight:800;letter-spacing:.06em;color:var(--gold);font-size:1.05rem}
  .code-tag .cl{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
  .foot{margin-top:24px;font-size:.82rem;color:var(--muted);text-align:center;line-height:1.6}
  .foot b{color:var(--cream2)}
  .flag{font-size:1.05rem}
  .err{text-align:center;padding:40px 20px}
  .err h2{font-size:1.2rem;margin-bottom:10px}
  .err p{color:var(--muted)}
  .err a{color:var(--gold);font-weight:700}
</style>
</head>
<body>
  <div class="band"></div>
  <div class="wrap">
    <div class="brand">
      <svg class="chakana" viewBox="0 0 100 100" fill="none" aria-hidden="true">
        <defs><linearGradient id="g1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#e0b352"/><stop offset=".5" stop-color="#c85a3c"/><stop offset="1" stop-color="#9e2b4e"/></linearGradient></defs>
        <path fill="url(#g1)" d="M40 0h20v20h20v20h20v20H80v20H60v20H40V80H20V60H0V40h20V20h20z"/><rect x="40" y="40" width="20" height="20" fill="#14121f"/>
      </svg>
      <div><div class="bt">Pasaporte Digital</div><div class="bs">Autenticidad · Artesanía Andina del Perú</div></div>
    </div>
    <div id="out"></div>
    <div class="foot" id="foot"></div>
  </div>
<script>
  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function row(k,v){return v?`<div class="r"><div class="k">${k}</div><div class="v">${esc(v)}</div></div>`:'';}
  function render(){
    const out=document.getElementById('out'),foot=document.getElementById('foot');
    let d=null;
    const hash=location.hash.replace(/^#/,'');
    if(hash){try{const p=new URLSearchParams(hash);if(p.get('n'))d={n:p.get('n'),r:p.get('r'),p:p.get('p'),f:p.get('f'),t:p.get('t'),y:p.get('y'),c:p.get('c'),x:p.get('x'),s:p.get('s')};}catch(e){d=null;}}
    if(!d||!d.n){
      out.innerHTML=`<div class="card err"><h2>Pasaporte no encontrado</h2>
        <p>Este enlace muestra la ficha de autenticidad de una pieza artesanal andina cuando se abre desde su <b>código QR</b>.<br><br>
        ¿Eres artesano? Crea el tuyo en <a href="vitrina_andina_ia.html">Vitrina Andina IA</a>.</p></div>`;
      return;
    }
    out.innerHTML=`
      <div class="card">
        <span class="verified">✓ Pieza verificada</span>
        <div class="label">Hecho a mano en los Andes</div>
        <h1>${esc(d.n)}</h1>
        <div class="region"><span class="flag">📍</span>${esc(d.r||'Perú')}, Perú 🇵🇪</div>
        <div class="rows">
          ${row('Producto', d.p)}
          ${row('Fibra', d.f)}
          ${row('Técnica', d.t)}
          ${row('Experiencia', d.y)}
          ${row('Contacto', d.x)}
        </div>
        ${d.s?`<div class="story">“${esc(d.s)}”</div>`:''}
        <div class="code-tag">
          <div><div class="cl">Código único de pieza</div><div class="c">${esc(d.c||'—')}</div></div>
          <span class="verified">QR</span>
        </div>
      </div>`;
    foot.innerHTML=`Esta ficha viaja dentro del propio código QR de la pieza. <b>Origen garantizado:</b> tejido a mano por artesanos andinos del Perú con fibra natural de camélidos (alpaca, vicuña o llama). · <b>Artesanía Inteligente · Expo Perú Los Andes</b>`;
  }
  render();
  window.addEventListener('hashchange',render);
</script>
</body>
</html>
